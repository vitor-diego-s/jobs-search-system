database:
  path: data/candidates.db

quotas:
  linkedin:
    max_searches_per_day: 2
    max_candidates_per_day: 150

browser:
  cookies_path: config/linkedin_cookies.json
  timeout_ms: 30000

searches:
  - keyword: "Senior Python Engineer"
    platform: linkedin
    filters:
      geo_id: 92000000           # Worldwide
      workplace_type: [remote]
      experience_level: [senior, director]
      easy_apply_only: true
      max_pages: 3
    exclude_keywords:
      - Junior
      - Frontend
      - React
      - Angular
      - PHP
      - Ruby
      - .NET
      - iOS
      - Android
      - Java
      - Spring
    require_keywords: []
    scoring_keywords:
      - Python
      - Kubernetes
      - Machine Learning
      - TensorFlow
      - Docker
      - PostgreSQL
      - AWS
      - GCP
      - FastAPI
      - REST
      - Airflow
      - MLflow
      - Helm
      - Langchain
      - RAG
      - Computer Vision
    description_exclude_patterns:
      - "visa sponsorship"
      - "work authorization"
      - "authorized to work"
      - "right to work"
      - "work permit"
      - "legally authorized"
      - "eligible to work"
    fetch_description: true

