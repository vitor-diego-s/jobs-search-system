scoring:
  title_match_bonus: 20
  seniority_match_bonus: 15
  easy_apply_bonus: 10
  remote_bonus: 10
  recency_weight: 0.3
  # LLM scoring (M10) — set llm_enabled: true to activate
  llm_enabled: true
  llm_provider: gemini        # gemini | anthropic | openai | ollama
  llm_model: null             # null = provider default (gemini-2.5-flash)
  rule_weight: 0.4
  llm_weight: 0.6

profile_path: config/profile.yaml
